name: Publish to NuGet

on:
  workflow_run:
    workflows:
      - .NET 10 CI
    types:
      - completed
  workflow_dispatch:

jobs:
  publish-nuget:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success' &&
          startsWith(github.event.workflow_run.head_branch, 'v')
        )
      }}
    runs-on: ubuntu-24.04
    environment: nuget
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore tests/ChapterTool.Core.Tests/ChapterTool.Core.Tests.csproj
          dotnet restore src/ChapterTool.Cli/ChapterTool.Cli.csproj

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "$RELEASE_TAG" =~ ^v(.+)$ ]]; then
            echo "package-version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "package-version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          dotnet build tests/ChapterTool.Core.Tests/ChapterTool.Core.Tests.csproj --configuration Release --no-restore
          dotnet build src/ChapterTool.Cli/ChapterTool.Cli.csproj --configuration Release --no-restore

      - name: Test Core
        run: dotnet test tests/ChapterTool.Core.Tests/ChapterTool.Core.Tests.csproj --configuration Release --no-build

      - name: Pack
        shell: bash
        run: |
          projects=(
            src/ChapterTool.Core/ChapterTool.Core.csproj
            src/ChapterTool.Cli/ChapterTool.Cli.csproj
          )
          for project in "${projects[@]}"; do
            args=(
              "$project"
              --configuration Release
              --no-build
              --no-restore
              --output artifacts/nuget
              /p:ContinuousIntegrationBuild=true
            )
            if [[ -n "${{ steps.version.outputs.package-version }}" ]]; then
              args+=(/p:PackageVersion=${{ steps.version.outputs.package-version }})
            fi
            dotnet pack "${args[@]}"
          done

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push package and symbols to NuGet.org
        run: dotnet nuget push artifacts/nuget/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push package to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet nuget push artifacts/nuget/*.nupkg --api-key "$GITHUB_TOKEN" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
