name: Publish GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag whose successful CI artifacts should be published
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Validate tag
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            echo "Expected a tag such as v23.2.0 or v23.2.0-rc.1" >&2
            exit 1
          fi

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Locate successful CI run
        id: ci-run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow dotnet-ci.yml \
              --limit 100 \
              --json databaseId,headBranch,event,status,conclusion,createdAt \
            | jq -r --arg tag "$TAG" '
                [.[]
                  | select(.headBranch == $tag)
                  | select(.event == "push")
                  | select(.status == "completed" and .conclusion == "success")
                ]
                | sort_by(.createdAt)
                | last
                | .databaseId // empty
              '
          )"

          if [[ -z "$run_id" ]]; then
            echo "No successful dotnet-ci.yml run found for $TAG" >&2
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"
          echo "Using CI run $run_id for $TAG"

      - name: Download CI artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.ci-run.outputs.run-id }}
        run: |
          mkdir -p release-assets/publish release-assets/staging

          artifact_names=()
          while IFS= read -r artifact_name; do
            [[ -n "$artifact_name" ]] && artifact_names+=("$artifact_name")
          done < <(
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts?per_page=100" \
            | jq -r '.artifacts[] | select(.expired == false) | .name'
          )

          if (( ${#artifact_names[@]} == 0 )); then
            echo "No non-expired artifacts found for CI run $RUN_ID" >&2
            exit 1
          fi

          for artifact_name in "${artifact_names[@]}"; do
            staging_dir="release-assets/staging/$artifact_name"
            mkdir -p "$staging_dir"
            gh run download "$RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$artifact_name" \
              --dir "$staging_dir"

            if find "$staging_dir" -type f \( -name '*.nupkg' -o -name '*.snupkg' \) -print -quit | grep -q .; then
              find "$staging_dir" -type f \
                \( -name '*.nupkg' -o -name '*.snupkg' \) \
                -exec cp {} release-assets/publish/ \;
            fi

            if find "$staging_dir" -type f ! \( -name '*.nupkg' -o -name '*.snupkg' \) -print -quit | grep -q .; then
              (
                cd "$staging_dir"
                zip -q -r "$GITHUB_WORKSPACE/release-assets/publish/$artifact_name.zip" . \
                  -x '*.nupkg' '*.snupkg'
              )
            fi
          done

          if [[ -z "$(find release-assets/publish -maxdepth 1 -type f -print -quit)" ]]; then
            echo "No publishable files were produced from CI artifacts" >&2
            exit 1
          fi

          find release-assets/publish -maxdepth 1 -type f -print | sort

      - name: Prepare release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' ChangeLog.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "No changelog section found for $version" >&2
            exit 1
          fi

          previous_tag="$(
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/tags?per_page=100" \
              --jq '.[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' \
            | sort -V \
            | awk -v current="$TAG" '$0 == current { print previous; exit } { previous=$0 }'
          )"

          {
            printf '\n**Full Changelog**: '
            if [[ -n "$previous_tag" ]]; then
              printf 'https://github.com/%s/compare/%s...%s\n' \
                "$GITHUB_REPOSITORY" "$previous_tag" "$TAG"
            else
              printf 'https://github.com/%s/releases/tag/%s\n' \
                "$GITHUB_REPOSITORY" "$TAG"
            fi
          } >> release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Updating existing release: $TAG"
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
              --jq '.assets[]? | [.id, .name] | @tsv' \
            | while IFS=$'\t' read -r asset_id asset_name; do
                [[ -z "$asset_id" ]] && continue
                echo "Deleting old asset: $asset_name"
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
              done

            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "ChapterTool ${TAG#v}" \
              --notes-file release-notes.md
            gh release upload "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              release-assets/publish/*
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ChapterTool ${TAG#v}" \
            --notes-file release-notes.md \
            release-assets/publish/*
